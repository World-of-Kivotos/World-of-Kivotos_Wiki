server {
    listen 80;
    listen [::]:80;
    server_name wiki.mcwok.cn;

    root /var/www/wiki.mcwok.cn;
    index index.html;

    # SPA 路由: 未命中的路径一律回退到 index.html (react-router 浏览器历史模式)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 带内容 hash 的静态资源 (assets/*.js|css|woff2): 长缓存且不可变
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 不缓存, 保证发布新版本后立即生效
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
